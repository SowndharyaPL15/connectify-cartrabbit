version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: connectify-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    environment:
      # These environment variables override your local .env for the Docker container
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=connectify
      - DB_USERNAME=connectify_user
      - DB_PASSWORD=secret
    depends_on:
      - db
    networks:
      - connectify

  webserver:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - connectify

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: connectify
      MYSQL_USER: connectify_user
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root_secret
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - connectify

networks:
  connectify:
    driver: bridge

volumes:
  dbdata:
